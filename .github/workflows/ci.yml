name: CI

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pivotmap
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: pytest tests/
