services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pivotmap
      POSTGRES_USER: pivotmap
      POSTGRES_PASSWORD: pivotmap
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pivotmap -d pivotmap"]
      interval: 5s
      timeout: 5s
      retries: 10

  seed:
    image: python:3.12-slim
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://pivotmap:pivotmap@postgres:5432/pivotmap
      PYTHONPATH: /app
    command:
      - sh
      - -c
      - >-
        pip install psycopg[binary] &&
        python scripts/seed_modules.py --write
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    image: python:3.12-slim
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://pivotmap:pivotmap@postgres:5432/pivotmap
      DEMO_MODE: "false"
      PYTHONPATH: /app
    command:
      - sh
      - -c
      - >-
        pip install fastapi uvicorn psycopg[binary] &&
        uvicorn backend.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    depends_on:
      seed:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    ports:
      - "3000:3000"
