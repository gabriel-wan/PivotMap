services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pivotmap
      POSTGRES_USER: pivotmap
      POSTGRES_PASSWORD: pivotmap
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pivotmap -d pivotmap"]
      interval: 5s
      timeout: 5s
      retries: 10

  seed:
    image: python:3.12-slim
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+psycopg://pivotmap:pivotmap@db:5432/pivotmap
      PYTHONPATH: /app
    command:
      - sh
      - -c
      - >-
        pip install -r requirements.txt &&
        alembic upgrade head &&
        python scripts/seed_modules.py --write
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    image: python:3.12-slim
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+psycopg://pivotmap:pivotmap@db:5432/pivotmap
      DEMO_MODE: ${DEMO_MODE:-false}
      MIROMIND_API_KEY: ${MIROMIND_API_KEY:-}
      PYTHONPATH: /app
    command:
      - sh
      - -c
      - >-
        pip install -r requirements.txt &&
        uvicorn backend.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    depends_on:
      seed:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_DEMO_MODE: ${DEMO_MODE:-false}
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
